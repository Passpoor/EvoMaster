# LLM Configuration Example
llm:
  # OpenAI-compatible LLM configuration
  openai:
    provider: "openai"
    model: "gpt-5"
    api_key: "${OPENAI_API_KEY}"
    base_url: "${GPT_BASE_URL}"
    temperature: 0.7
    max_tokens: 16384
    timeout: 60
    max_retries: 3
    retry_delay: 1.0

  # Custom local vLLM (using Qwen model)
  local_vllm:
    provider: "openai"
    model: "Qwen/Qwen2.5-7B-Instruct"
    api_key: "sk-"
    base_url: "http://123.129.219.111:3000/v1"
    temperature: 0.8
    max_tokens: 16384
    timeout: 30
    max_retries: 2
    retry_delay: 0.5

  # Anthropic Claude configuration
  anthropic:
    provider: "anthropic"
    model: "claude-haiku-4-5-20251001"
    api_key: "${ANTHROPIC_API_KEY}"
    base_url: "${ANTHROPIC_BASE_URL}"
    temperature: 0.7
    max_tokens: 16384
    timeout: 60
    max_retries: 3
    retry_delay: 1.0

  # Default LLM configuration name
  default: "openai"
