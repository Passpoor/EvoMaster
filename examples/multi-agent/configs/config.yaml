# Multi-Agent Configuration Example
# Demonstrates how to configure independent prompt files for multiple agents

# ============================================
# LLM Configuration (shared by all agents)
# ============================================
llm:
  openai:
    provider: "openai"
    model: "gpt-5"
    api_key: "${OPENAI_API_KEY}"
    base_url: "https://api.openai.com/v1"
    temperature: 0.7
    max_tokens: 16384

  anthropic:
    provider: "anthropic"
    model: "claude-haiku-4-5-20251001"
    api_key: "${ANTHROPIC_API_KEY}"
    base_url: "https://api.anthropic.com"
    temperature: 0.7
    max_tokens: 16384

  default: "openai"

# ============================================
# Multi-Agent Configuration List
# ============================================
agents:
  # Agent 1: Code Generator
  - name: "code_generator"
    max_turns: 30
    llm: "openai"
    system_prompt_file: "prompts/code_generator_prompt.txt"
    context:
      max_tokens: 128000
      truncation_strategy: "latest_half"

  # Agent 2: Code Reviewer
  - name: "code_reviewer"
    max_turns: 20
    llm: "openai"
    system_prompt_file: "prompts/code_reviewer_prompt.txt"
    context:
      max_tokens: 128000
      truncation_strategy: "latest_half"

  # Agent 3: Test Generator
  - name: "test_generator"
    max_turns: 25
    llm: "openai"
    system_prompt_file: "prompts/test_generator_prompt.txt"
    context:
      max_tokens: 128000
      truncation_strategy: "latest_half"

# ============================================
# Session Configuration (shared by all agents)
# ============================================
session:
  type: "local"

  local:
    working_dir: "./workspace"
    timeout: 60
    symlinks: {}

  docker:
    image: "evomaster/base:latest"
    working_dir: "/workspace"
    memory_limit: "4g"
    cpu_limit: 2.0
    auto_remove: false

# ============================================
# MCP Configuration
# ============================================
mcp:
  config_file: "mcp_config.json"
  enabled: false

# ============================================
# Logging and Output Configuration
# ============================================
llm_output:
  show_in_console: true
  log_to_file: true

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  log_path: "./logs/evomaster.log"
