# Minimal Multi-Agent Parallel Playground — Docker session configuration
# Runs 3 parallel exps, each with its own Planning + Coding Agent.
# Run with:
#   python run.py --agent minimal_multi_agent_parallel \
#       --config configs/minimal_multi_agent_parallel/docker.yaml --task "..."
#
# Per-exp container behavior is controlled by `fresh_container_per_exp`
# below. When true (the default in this file), each parallel exp spins up
# its own brand-new Docker container that is auto-removed when the exp
# finishes — exactly matching the requirement:
#   "如果是并行，那么默认每次并行都新开 docker，运行完就删除这个 docker"

# ============================================
# LLM Configuration
# ============================================
llm:
  openai:
    provider: "openai"
    model: "${GPT_CHAT_MODEL}"
    api_key: "${OPENAI_API_KEY}"
    base_url: "${GPT_BASE_URL}"
    temperature: 0.7
    max_tokens: 16384
    timeout: 60
    max_retries: 3
    retry_delay: 1.0

  anthropic:
    provider: "anthropic"
    model: "claude-haiku-4-5-20251001"
    api_key: "${ANTHROPIC_API_KEY}"
    base_url: "${ANTHROPIC_BASE_URL}"
    temperature: 0.7
    max_tokens: 16384
    timeout: 60
    max_retries: 3
    retry_delay: 1.0

  local_sglang:
    provider: "deepseek"
    model: "deepseek-v3.2"
    api_key: "${DEEPSEEK_API_KEY}"
    base_url: "${DEEPSEEK_API_BASE}"
    temperature: 0.7
    max_tokens: 16384
    timeout: 300
    max_retries: 3
    retry_delay: 1.0

  default: "local_sglang"

# ============================================
# Multi-Agent Configuration
# ============================================
agents:
  planning:
    llm: "local_sglang"
    max_turns: 10
    tools:
      builtin: []
    context:
      max_tokens: 128000
      truncation_strategy: "latest_half"
      preserve_system_messages: true
      preserve_recent_turns: 5
    system_prompt_file: "prompts/planning_system_prompt.txt"
    user_prompt_file: "prompts/planning_user_prompt.txt"

  coding:
    llm: "local_sglang"
    max_turns: 50
    tools:
      builtin: ["*"]
    context:
      max_tokens: 128000
      truncation_strategy: "latest_half"
      preserve_system_messages: true
      preserve_recent_turns: 5
    system_prompt_file: "prompts/coding_system_prompt.txt"
    user_prompt_file: "prompts/coding_user_prompt.txt"

# ============================================
# Session Configuration
# ============================================
session:
  type: "docker"

  docker:
    image: "python:3.11"

    # Used as a *prefix* when fresh_container_per_exp=true (each exp gets
    # `<container_name>-exp-<i>`). Leave null for an auto-generated prefix.
    container_name: null
    use_existing_container: null

    working_dir: "/workspace"

    memory_limit: "8g"
    cpu_limit: 4.0
    gpu_devices: null
    network_mode: "bridge"

    volumes: {}
    env_vars: {}

    # When fresh_container_per_exp=true, the per-exp containers ALWAYS use
    # `--rm` regardless of this value (the entire point of the mode is to
    # tear them down). This auto_remove only applies if you flip
    # fresh_container_per_exp to false.
    auto_remove: true

    pull_image: "missing"
    timeout: 300

    # Parallel mode (consumed by MultiAgentParallelPlayground): how many
    # parallel exps to run. Defaults to 3 if omitted.
    parallel:
      max_parallel: 3

    # === Per-exp container lifecycle ===
    # true  → each parallel exp spins up its own Docker container, used
    #          ONLY by that exp, and removed (`docker rm`) when the exp
    #          finishes. Containers are named `<container_name|auto>-exp-<i>`.
    #          Each exp's host workspace is `<run_dir>/workspaces/exp_<i>`,
    #          mounted at `working_dir`.
    # false → all parallel exps share the playground's single Docker
    #          container. Each exp keeps its own working directory inside
    #          the container (per-thread cwd state).
    fresh_container_per_exp: true

llm_output:
  show_in_console: true
  log_to_file: true

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: null
  console: true
