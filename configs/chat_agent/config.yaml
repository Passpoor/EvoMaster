# Chat Agent 配置文件
# 面向对话式交互的 Agent，适用于飞书等即时通讯场景

# ============================================
# LLM 配置
# ============================================
llm:
  openai:
    provider: "openai"
    model: "${GPT_CHAT_MODEL}"
    api_key: "${OPENAI_API_KEY}"
    base_url: "${GPT_BASE_URL}"
    temperature: 0.7
    max_tokens: 16384
    timeout: 60
    max_retries: 3
    retry_delay: 1.0

  anthropic:
    provider: "anthropic"
    model: "${ANTHROPIC_MODEL}"
    api_key: "${ANTHROPIC_API_KEY}"
    base_url: "${ANTHROPIC_BASE_URL}"
    temperature: 0.7
    max_tokens: 16384
    timeout: 60
    max_retries: 3
    retry_delay: 1.0
  
  local_sglang:
    provider: "deepseek"
    model: "deepseek-v3.2"
    api_key: "${DEEPSEEK_API_KEY}"  # 本地部署可使用占位符
    base_url: "${DEEPSEEK_API_BASE}"
    temperature: 0.7
    max_tokens: 16384
    timeout: 300  
    max_retries: 3
    retry_delay: 1.0

  default: "local_sglang"

# ============================================
# Agent 配置
# ============================================
agents:
  general:
    llm: "local_sglang"
    max_turns: 50
    finish_on_text_response: true
    tools:
      builtin: ["*"]
      mcp: "mcp_config.json"
      google_search: "google_search"   # 自定义工具：google_search 或 ai_search
      ai_search: "ai_search"   # 自定义工具：google_search 或 ai_search
      web_fetch: "web_fetch"  # 网页抓取工具（可选）
      ask_user: "ask_user"  # 用户提问工具（可选）
      delegate_to_agent: "delegate_to_agent"  # 委托给其他代理工具（可选）
      feishu_doc_read: "feishu_doc_read"  # 飞书文档阅读工具（可选）
      send_file: "send_file"
      memory_search: "memory_search"
      memory_save: "memory_save"
      memory_forget: "memory_forget"

    skills:
      - "bohrium-oss"
      
    context:
      max_tokens: 128000
      truncation_strategy: "summary"
      preserve_system_messages: true
      preserve_recent_turns: 5

    system_prompt_file: "prompts/system_prompt.txt"
    user_prompt_file: "prompts/user_prompt.txt"

# ============================================
# MCP 配置
# ============================================
mcp:
  config_file: "mcp_config.json"
  enabled: False

# ============================================
# AI Search 配置（Perplexity 风格综合搜索）
# ============================================
ai_search:
  provider: "perplexity"
  api_key: "${WEB_SEARCH_API_KEY}"
  base_url: "${WEB_SEARCH_BASE_URL}"
  model: "${WEB_SEARCH_MODEL}"

# ============================================
# Google Search 配置（Serper API）
# ============================================
google_search:
  api_key: "${SERPER_KEY_ID}"

# ============================================
# Web Fetch 配置（Jina Reader API，LLM 摘要复用默认 LLM）
# ============================================
web_fetch:
  api_key: "${JINA_API_KEY}"

# ============================================
# Memory 配置（跨会话持久化记忆）
# ============================================
memory:
  enabled: true
  db_path: "./data/memory/memories.db"
  auto_capture: true          # 自动从对话中提取记忆（规则匹配）
  auto_recall: true           # 自动在对话开始时注入相关记忆
  recall_limit: 5             # 自动召回的最大记忆数
  max_memories_per_user: 500  # 每用户最大记忆数
  capture_with_llm: false     # 是否用 LLM 做更精准的记忆提取

# ============================================
# Session 配置
# ============================================
session:
  type: "local"

  local:
    working_dir: "./playground/chat_agent/workspace"
    timeout: 60
    gpu_devices: "0"
    cpu_devices: "0-15"
    symlinks: {}

  docker:
    image: "evomaster/base:latest"
    container_name: null
    use_existing_container: null
    working_dir: "/workspace"
    memory_limit: "64g"
    cpu_limit: 16.0
    gpu_devices: "0"
    network_mode: "host"
    volumes: {"./playground/chat_agent/workspace": "/workspace"}
    env_vars: {}
    auto_remove: false
    timeout: 300

# ============================================
# Env 配置
# ============================================
env:
  cluster:
    debug_pool:
      type: "cpu"
      max_concurrent: 1
    train_pool:
      type: "cpu"
      max_concurrent: 1
  docker:
    base_image: "python:3.11-slim"
    registry: "docker.io"
    pull_policy: "if_not_present"
  scheduler:
    type: "local"
    queue_timeout: 300
    retry_failed: false
    max_retries: 1

# ============================================
# LLM 输出显示配置
# ============================================
llm_output:
  show_in_console: true
  log_to_file: true

# ============================================
# 日志配置
# ============================================
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: null
  console: true
  log_path: "./logs/evomaster.log"

# ============================================
# 其他配置
# ============================================
project_root: "."
workspace: "./workspace"
results_dir: "./results"
debug: false
