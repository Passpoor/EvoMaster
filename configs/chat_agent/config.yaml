# Chat Agent 配置文件
# 面向对话式交互的 Agent，适用于飞书等即时通讯场景

# ============================================
# LLM 配置
# ============================================
llm:
  openai:
    provider: "openai"
    model: "${GPT_CHAT_MODEL}"
    api_key: "${OPENAI_API_KEY}"
    base_url: "${GPT_BASE_URL}"
    temperature: 0.7
    max_tokens: 16384
    timeout: 60
    max_retries: 3
    retry_delay: 1.0

  anthropic:
    provider: "anthropic"
    model: "${ANTHROPIC_MODEL}"
    api_key: "${ANTHROPIC_API_KEY}"
    base_url: "${ANTHROPIC_BASE_URL}"
    temperature: 0.7
    max_tokens: 16384
    timeout: 60
    max_retries: 3
    retry_delay: 1.0
  
  local_sglang:
    provider: "deepseek"
    model: "deepseek-v3.2"
    api_key: "${DEEPSEEK_API_KEY}"  # 本地部署可使用占位符
    base_url: "${DEEPSEEK_API_BASE}"
    temperature: 0.7
    max_tokens: 16384
    timeout: 300  
    max_retries: 3
    retry_delay: 1.0

  default: "local_sglang"

# ============================================
# Agent 配置
# ============================================
agents:
  general:
    llm: "local_sglang"
    max_turns: 50
    enable_tools: true
    finish_on_text_response: true

    context:
      max_tokens: 128000
      truncation_strategy: "summary"
      preserve_system_messages: true
      preserve_recent_turns: 5

    system_prompt_file: "prompts/system_prompt.txt"
    user_prompt_file: "prompts/user_prompt.txt"

# ============================================
# MCP 配置
# ============================================
mcp:
  config_file: "mcp_config.json"
  enabled: False

# ============================================
# Web Search 配置
# ============================================
web_search:
  provider: "perplexity"
  api_key: "${WEB_SEARCH_API_KEY}"
  base_url: "${WEB_SEARCH_BASE_URL}"
  model: "${WEB_SEARCH_MODEL}"

# ============================================
# Session 配置
# ============================================
session:
  type: "local"

  local:
    working_dir: "./playground/chat_agent/workspace"
    timeout: 60
    gpu_devices: "0"
    cpu_devices: "0-15"
    symlinks: {}

  docker:
    image: "evomaster/base:latest"
    container_name: null
    use_existing_container: null
    working_dir: "/workspace"
    memory_limit: "64g"
    cpu_limit: 16.0
    gpu_devices: "0"
    network_mode: "host"
    volumes: {"./playground/chat_agent/workspace": "/workspace"}
    env_vars: {}
    auto_remove: false
    timeout: 300

# ============================================
# Env 配置
# ============================================
env:
  cluster:
    debug_pool:
      type: "cpu"
      max_concurrent: 1
    train_pool:
      type: "cpu"
      max_concurrent: 1
  docker:
    base_image: "python:3.11-slim"
    registry: "docker.io"
    pull_policy: "if_not_present"
  scheduler:
    type: "local"
    queue_timeout: 300
    retry_failed: false
    max_retries: 1

# ============================================
# LLM 输出显示配置
# ============================================
llm_output:
  show_in_console: true
  log_to_file: true

# ============================================
# 日志配置
# ============================================
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: null
  console: true
  log_path: "./logs/evomaster.log"

# ============================================
# 其他配置
# ============================================
project_root: "."
workspace: "./workspace"
results_dir: "./results"
debug: false
